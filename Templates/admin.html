 <!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 40px; }
        .dashboard { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 4px 10px gray; max-width: 800px; margin: auto; }
        h2 { text-align: center; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #007BFF; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .back-btn { display: inline-block; margin-bottom: 20px; text-decoration: none; color: white; background-color: #6c757d; padding: 10px 15px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <a href="/" class="back-btn">← Back to Home</a>
        <h2>🏨 Hotel Manager Dashboard</h2>
        
        <table>
            <thead>
                <tr>
                    <th>Booking ID</th>
                    <th>Guest Name</th>
                    <th>Check-in</th>
                    <th>Check-out</th>
                    <th>Room Type</th>
                </tr>
            </thead>
            <tbody>
                {% for row in bookings %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>{{ row[3] }}</td>
                    <td>{{ row[4] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
